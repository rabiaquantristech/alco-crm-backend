<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>Login Alert</title>
</head>

<body style="margin:0; padding:0; background:#f6f9fc; font-family:Arial, sans-serif;">

    <table width="100%" cellpadding="0" cellspacing="0" style="padding:20px;">
        <tr>
            <td align="center">

                <table width="600" cellpadding="0" cellspacing="0"
                    style="background:#ffffff; border-radius:10px; padding:30px;">

                    <!-- Header -->
                    <tr>
                        <td align="center">
                            <h2 style="margin:0; color:#111;">New Login 🔐</h2>
                        </td>
                    </tr>

                    <!-- Content -->
                    <tr>
                        <td style="padding:20px 0; color:#555; text-align:center;">
                            <p style="font-size:16px; margin:0;">
                                Hi <strong>{{UserName}}</strong>,
                            </p>

                            <p style="margin-top:10px;">
                                You have successfully logged into your account.
                            </p>

                            <p style="margin-top:10px;">
                                If this wasn’t you, please secure your account immediately.
                            </p>
                        </td>
                    </tr>

                    <!-- Button -->
                    <tr>
                        <td align="center" style="padding:20px 0;">
                            <a href="{{SecurityLink}}" style="background:#2563eb; color:#fff; padding:12px 25px; 
                text-decoration:none; border-radius:6px; font-size:14px;">
                                Secure Your Account
                            </a>
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td style="padding-top:20px; text-align:center; color:#888; font-size:12px;">
                            <p style="margin:0;">
                                This is an automated message, please do not reply.
                            </p>
                            <p style="margin-top:5px;">
                                © {{YourCompanyName}}. All rights reserved.
                            </p>
                        </td>
                    </tr>

                </table>

            </td>
        </tr>
    </table>

</body>

</html>
